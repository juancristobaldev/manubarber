    <script>
      const navbar = document.getElementById("navbar");
      window.addEventListener("scroll", () => {
        if (window.scrollY > 50) {
          navbar.classList.add(
            "bg-brand-black",
            "border-b",
            "border-brand-red/20",
            "shadow-glow-red/10",
            "py-3",
          );
          navbar.classList.remove("py-4");
        } else {
          navbar.classList.remove(
            "bg-brand-black",
            "border-b",
            "border-brand-red/20",
            "shadow-glow-red/10",
            "py-3",
          );
          navbar.classList.add("py-4");
        }
      });

      // 2. Mobile Menu Toggle
      const menuBtn = document.getElementById("mobile-menu-btn");
      const mobileMenu = document.getElementById("mobile-menu");
      const mobileLinks = document.querySelectorAll(".mobile-link");
      let isMenuOpen = false;

      function toggleMenu() {
        isMenuOpen = !isMenuOpen;
        if (isMenuOpen) {
          mobileMenu.classList.remove("opacity-0", "pointer-events-none");
          mobileMenu.classList.add("opacity-100", "pointer-events-auto");
          menuBtn.innerHTML =
            '<i class="fa-solid fa-xmark text-brand-red"></i>';
          document.body.style.overflow = "hidden";
        } else {
          mobileMenu.classList.add("opacity-0", "pointer-events-none");
          mobileMenu.classList.remove("opacity-100", "pointer-events-auto");
          menuBtn.innerHTML = '<i class="fa-solid fa-bars"></i>';
          document.body.style.overflow = "auto";
        }
      }

      menuBtn.addEventListener("click", toggleMenu);
      mobileLinks.forEach((link) => {
        link.addEventListener("click", () => {
          if (isMenuOpen) toggleMenu();
        });
      });

      // 1. Lógica Filtros de Galería (ACTUALIZADO)
      const filterBtns = document.querySelectorAll(".filter-btn");
      const galleryItems = document.querySelectorAll(".gallery-item");

      filterBtns.forEach((btn) => {
        btn.addEventListener("click", () => {
          // Remover estilos activos de todos los botones
          filterBtns.forEach((b) => {
            b.classList.remove(
              "bg-brand-red",
              "text-white",
              "border-brand-red",
            );
            b.classList.add("border-white/10", "text-gray-400");
          });

          // Agregar estilos activos al botón clickeado
          btn.classList.remove("border-white/10", "text-gray-400");
          btn.classList.add("bg-brand-red", "text-white", "border-brand-red");

          const filterValue = btn.getAttribute("data-filter");

          // Filtrar items con animación
          galleryItems.forEach((item) => {
            const itemCategory = item.getAttribute("data-category");

            // Ocultar suavemente primero
            item.style.opacity = "0";
            item.style.transform = "scale(0.9)";

            setTimeout(() => {
              if (filterValue === "all" || filterValue === itemCategory) {
                item.style.display = "block"; // Aseguramos que vuelva al Grid

                // Mostrar suavemente
                setTimeout(() => {
                  item.style.opacity = "1";
                  item.style.transform = "scale(1)";
                }, 50);
              } else {
                item.style.display = "none"; // Quitar del flujo para que Grid se reorganice
              }
            }, 300); // Tiempo coincide con transition-all
          });
        });
      });

      // 2. Lógica Lightbox
      const lightbox = document.getElementById("lightbox");
      const lightboxImg = document.getElementById("lightbox-img");

      function openLightbox(src, caption) {
        lightboxImg.src = src;
        lightbox.classList.add("active");
        document.body.style.overflow = "hidden";
      }

      function closeLightbox() {
        lightbox.classList.remove("active");
        document.body.style.overflow = "auto";
      }

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeLightbox();
      });

      // 3. Scroll Animations (Intersection Observer)
      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              entry.target.classList.add("active");
            }
          });
        },
        { threshold: 0.1 },
      );

      document
        .querySelectorAll(".reveal")
        .forEach((el) => observer.observe(el));
    </script>
